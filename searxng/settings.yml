# ─────────────────────────────────────────────────────────
# Configuration SearXNG pour KamContent
# Documentation : https://docs.searxng.org/admin/settings
# ─────────────────────────────────────────────────────────

use_default_settings: true

general:
  # Langue d'interface par défaut
  default_locale: fr
  # Activer les logs de recherche (désactiver en prod pour la confidentialité)
  debug: false

server:
  # URL de base (doit correspondre à SEARXNG_BASE_URL dans docker-compose)
  base_url: http://searxng:8080
  # Clé secrète (générée automatiquement si vide, mais définir en prod)
  secret_key: "${SEARXNG_SECRET_KEY}"
  # Activer le CORS pour les appels depuis l'app Next.js
  limiter: false
  image_proxy: false

ui:
  # Désactiver l'interface web (usage API uniquement)
  default_theme: simple
  results_on_new_tab: false

# Activer le format JSON pour l'API
search:
  # Formats de sortie autorisés
  formats:
    - html
    - json
  safe_search: 0
  default_lang: "fr-FR"
  max_page: 1
  # Bannière de résultats
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

# Moteurs de recherche activés
# On privilégie ceux sans rate-limit strict
engines:
  - name: duckduckgo
    engine: duckduckgo
    categories: general
    shortcut: ddg

  - name: brave
    engine: brave
    categories: general
    shortcut: brave

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    base_url: 'https://fr.wikipedia.org/'

  - name: bing
    engine: bing
    categories: general
    shortcut: b
    disabled: false

# Désactiver les moteurs problématiques pour usage auto (Google bloque les bots)
  - name: google
    engine: google
    disabled: true

# Redis pour le cache
redis:
  url: redis://redis:6379/0
