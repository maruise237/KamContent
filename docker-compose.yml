name: kamcontent

services:
  # ─────────────────────────────────────────────
  # Application Next.js
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kamcontent}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kamcontent}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      # Fournisseur IA
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      # Clés spécifiques par fournisseur (Vercel AI SDK les lit automatiquement)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Recherche web
      SEARXNG_URL: http://searxng:8080
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # WhatsApp — Evolution API
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-kamcontent}
      # Sécurité
      CRON_SECRET: ${CRON_SECRET:-changeme}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      searxng:
        condition: service_started
      evolution:
        condition: service_started
    networks:
      - kamcontent

  # ─────────────────────────────────────────────
  # Migrations Drizzle (run-once au démarrage)
  # ─────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kamcontent}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kamcontent}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kamcontent
    restart: "no"

  # ─────────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kamcontent}
      POSTGRES_USER: ${POSTGRES_USER:-kamcontent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kamcontent} -d ${POSTGRES_DB:-kamcontent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kamcontent
    # Ne pas exposer le port en production (accès interne uniquement)
    # ports:
    #   - "5432:5432"

  # ─────────────────────────────────────────────
  # SearXNG — moteur de recherche web gratuit
  # ─────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:-changeme-searxng-secret}
    volumes:
      - ./searxng:/etc/searxng:rw
    depends_on:
      - redis
    networks:
      - kamcontent
    # Ne pas exposer à l'extérieur (accès interne uniquement)
    # Pour accéder en dev : décommenter la ligne suivante
    # ports:
    #   - "8080:8080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # ─────────────────────────────────────────────
  # Redis — cache pour SearXNG + Evolution API
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - kamcontent
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  # ─────────────────────────────────────────────
  # Evolution API — WhatsApp auto-hébergé
  # Documentation : https://doc.evolution-api.com
  # ─────────────────────────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT:-8081}:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8081}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme-evolution-key}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-kamcontent}:${POSTGRES_PASSWORD}@db:5432/${EVOLUTION_DB:-evolution}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_client
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      QRCODE_LIMIT: "30"
      DEL_INSTANCE: "false"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kamcontent

networks:
  kamcontent:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  evolution_instances:
    driver: local
