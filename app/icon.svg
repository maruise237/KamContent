<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background blue rounded square -->
  <rect width="200" height="200" rx="42" fill="#29AAE2"/>

  <!-- K letter -->
  <!-- Vertical bar -->
  <rect x="26" y="36" width="18" height="128" rx="4" fill="white"/>
  <!-- Upper arm -->
  <polygon points="44,100 44,36 102,36 102,56 66,100" fill="white"/>
  <!-- Lower arm -->
  <polygon points="44,100 44,164 102,164 102,144 66,100" fill="white"/>

  <!-- Smartphone outline -->
  <rect x="110" y="36" width="62" height="112" rx="11" fill="none" stroke="white" stroke-width="7"/>
  <!-- Speaker bar at top -->
  <rect x="128" y="49" width="26" height="5" rx="2.5" fill="white"/>
  <!-- Home dot at bottom -->
