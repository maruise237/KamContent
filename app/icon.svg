<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BEF0"/>
      <stop offset="100%" stop-color="#1A9DD2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="42" fill="url(#bg)"/>

  <!-- K letter -->
  <rect x="24" y="35" width="19" height="130" rx="4" fill="white"/>
  <polygon points="43,100 43,35 100,35 100,58 65,100" fill="white"/>
  <polygon points="43,100 43,165 100,165 100,142 65,100" fill="white"/>

  <!-- Smartphone outline (portrait) -->
  <rect x="100" y="35" width="66" height="130" rx="13" fill="none" stroke="white" stroke-width="7"/>
  <!-- Speaker slot at top -->
  <rect x="117" y="47" width="32" height="6" rx="3" fill="white"/>
  <!-- Home indicator at bottom -->
  <rect x="119" y="152" width="28" height="6" rx="3" fill="white"/>
  <!-- Play triangle centered in screen area -->
  <polygon points="118,83 118,117 153,100" fill="white"/>
</svg>
